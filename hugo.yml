  homeInfoParams:
    Title: "What NGWS Pursues"
    Content: "We build principled security foundations for a web where humans, AI agents, browsers, and online services increasingly act together. Our lab values growing together through research and sharing good ideas, good systems, and good impact to shape a safer, more trustworthy world."

  socialIcons:
